include ~/.config/kitty/VSCode_Dark.conf

enabled_layouts splits

# vertical split (like your split_vert)
map ctrl+shift+p launch --location=vsplit --cwd=current

# horizontal split
map ctrl+shift+o launch --location=hsplit --cwd=current

# new tab at current window's cwd
map ctrl+shift+t new_tab_with_cwd

# Split moves
map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window down
map ctrl+shift+k neighboring_window up
map ctrl+shift+l neighboring_window right

# Toggle light and dark
map ctrl+shift+1 set_colors ~/.config/kitty/VSCode_Dark.conf
map ctrl+shift+2 set_colors ~/.config/kitty/day.conf

# Allow config reloading
allow_remote_control yes

# Font
font_family      JetBrainsMono Nerd Font Mono
font_size        11.0

# Scrollback
scrollback_lines -1

# Tab bar
tab_bar_style powerline

# Shell integration
shell_integration enabled

# URL handling
detect_urls yes
open_url_with default

